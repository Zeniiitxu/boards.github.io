<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>focus.live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #fff9f0;
            --bg-gradient-end: #ffe8dc;
            --text-primary: #3d2b1a;
            --text-soft: #9b7b5c;
            --card-bg: rgba(255, 251, 245, 0.92);
            --card-border: #f0e0d0;
            --accent-peach: #ff6b6b;
            --accent-warm: #ffb347;
            --avatar-bg: #fff5ee;
            --avatar-border: #ffd9c4;
            --avatar-active: #ffe8dc;
            --input-bg: #ffffffdd;
            --input-border: #ffdec8;
            --timer-bg: #fff8f2;
            --leader-row-border: #f5e6da;
            --chat-bubble: #ffffffdd;
            --chat-border-left: #ff8c6b;
            --scroll-track: #f5e6da;
            --scroll-thumb: #ffc4a8;
            --badge-bg: #fff0e8;
            --online-green: #7cb518;
            --typing-bg: #fff5ee;
            --shadow-sm: 0 8px 24px rgba(255, 107, 107, 0.12);
            --button-gradient-start: #ff8c6b;
            --button-gradient-end: #ffb347;
            --clock-bg: #fff0e8;
            --goal-bg: #fff5ee;
        }

        body.dark {
            --bg-gradient-start: #2a2418;
            --bg-gradient-end: #1f1a12;
            --text-primary: #f5ede0;
            --text-soft: #c4a88a;
            --card-bg: rgba(45, 38, 30, 0.92);
            --card-border: #5a4a38;
            --accent-peach: #ff8c6b;
            --accent-warm: #e6974a;
            --avatar-bg: #3d3226;
            --avatar-border: #6a553f;
            --avatar-active: #4d3e2e;
            --input-bg: #3d3226cc;
            --input-border: #6a553f;
            --timer-bg: #3d3226;
            --leader-row-border: #4d3e2e;
            --chat-bubble: #3d3226cc;
            --chat-border-left: #ff8c6b;
            --scroll-track: #3d3226;
            --scroll-thumb: #6a553f;
            --badge-bg: #3d3226;
            --typing-bg: #3d3226;
            --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.3);
            --button-gradient-start: #ff8c6b;
            --button-gradient-end: #e6974a;
            --clock-bg: #3d3226;
            --goal-bg: #3d3226;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            padding: 16px;
            min-height: 100vh;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .top-bar h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-peach), var(--accent-warm));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .clock-widget {
            background: var(--clock-bg);
            border-radius: 60px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--card-border);
            font-family: monospace;
        }
        .clock-time { font-size: 1rem; font-weight: 600; color: var(--accent-peach); }
        .clock-date { font-size: 0.65rem; color: var(--text-soft); }
        .dark-toggle {
            background: var(--badge-bg);
            border: 1px solid var(--card-border);
            border-radius: 60px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text-primary);
        }

        .status-banner {
            background: var(--badge-bg);
            border-radius: 60px;
            padding: 5px 12px;
            font-size: 0.65rem;
            text-align: center;
            margin-bottom: 16px;
        }

        .study-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-soft);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-peach);
        }

        .avatar-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .avatar-btn {
            background: var(--avatar-bg);
            border: 2px solid var(--avatar-border);
            border-radius: 60px;
            font-size: 1.2rem;
            padding: 6px 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .avatar-btn span { font-size: 0.65rem; }
        .avatar-btn.active {
            background: var(--avatar-active);
            border-color: var(--accent-peach);
        }

        .minimal-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 60px;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text-primary);
        }
        .minimal-input:focus { outline: none; border-color: var(--accent-peach); }

        .timer-block {
            background: var(--timer-bg);
            border-radius: 48px;
            padding: 16px;
            text-align: center;
            margin: 10px 0;
            border: 2px solid var(--card-border);
        }
        #timer {
            font-family: monospace;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .timer-pulse {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); text-shadow: 0 0 8px rgba(255,107,107,0.3); }
            100% { transform: scale(1); }
        }

        .button-group {
            display: flex;
            gap: 10px;
        }
        .cute-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--button-gradient-start), var(--button-gradient-end));
            border: none;
            padding: 10px 0;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
        }
        .cute-btn.secondary {
            background: linear-gradient(135deg, #c97a52, #b86a44);
        }

        .scroll-area {
            max-height: 180px;
            overflow-y: auto;
            margin: 8px 0;
        }

        .active-users-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .active-user-chip {
            background: var(--badge-bg);
            padding: 4px 10px;
            border-radius: 60px;
            font-size: 0.7rem;
            border: 1px solid var(--card-border);
        }
        .online-dot {
            width: 6px;
            height: 6px;
            background: #7cb518;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .leader-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--leader-row-border);
            font-size: 0.75rem;
        }

        .longest-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .longest-block {
            background: var(--badge-bg);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid var(--accent-peach);
        }
        .longest-rank { font-size: 1rem; min-width: 30px; }
        .longest-avatar { font-size: 1.3rem; }
        .longest-info { flex: 1; }
        .longest-name { font-weight: 600; font-size: 0.75rem; }
        .longest-time { font-size: 0.6rem; opacity: 0.7; }

        /* Goals section */
        .goals-container {
            margin-top: 8px;
        }
        .goal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--leader-row-border);
        }
        .goal-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-peach);
        }
        .goal-text {
            flex: 1;
            font-size: 0.8rem;
            word-break: break-word;
        }
        .goal-text.completed {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .goal-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.5;
        }
        .add-goal {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-goal input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 60px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-family: inherit;
        }
        .add-goal button {
            background: var(--accent-peach);
            border: none;
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.7rem;
            color: white;
            font-weight: 600;
        }

        .chat-message {
            background: var(--chat-bubble);
            border-radius: 16px;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-left: 3px solid var(--chat-border-left);
        }
        .chat-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            font-size: 0.6rem;
        }
        .chat-user { font-weight: 600; color: var(--accent-peach); }
        .chat-time { margin-left: auto; font-size: 0.5rem; opacity: 0.6; }
        .chat-text { font-size: 0.75rem; word-break: break-word; }

        .input-send {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .input-send input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 60px;
            padding: 8px 12px;
            font-size: 0.75rem;
        }
        .input-send button {
            background: linear-gradient(135deg, var(--button-gradient-start), var(--button-gradient-end));
            border: none;
            width: 40px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.9rem;
            color: white;
        }

        .typing-indicator {
            font-size: 0.6rem;
            padding: 4px 8px;
            background: var(--typing-bg);
            border-radius: 60px;
            display: inline-block;
            margin-top: 6px;
        }

        .clear-chat-btn {
            background: var(--badge-bg);
            border: 1px solid var(--card-border);
            border-radius: 60px;
            padding: 4px 10px;
            font-size: 0.6rem;
            cursor: pointer;
            margin-left: 8px;
            color: var(--text-soft);
        }

        .tiny-note {
            font-size: 0.55rem;
            text-align: center;
            margin-top: 16px;
            opacity: 0.5;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--scroll-track); }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        @media (max-width: 768px) {
            .study-grid { grid-template-columns: 1fr; gap: 12px; }
            #timer { font-size: 2.2rem; }
            .header-row { flex-direction: column; align-items: stretch; }
            .dark-toggle { text-align: center; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <h1>focus.live</h1>
        <div class="header-row">
            <div class="clock-widget">
                <span class="clock-time" id="clockTime">--:-- --</span>
                <span class="clock-date" id="clockDate">--- --</span>
            </div>
            <button class="dark-toggle" id="darkModeToggle">🌙 dark</button>
        </div>
    </div>
    <div class="status-banner" id="connectionStatus">🔄 connecting...</div>

    <div class="study-grid">
        <div class="left-column">
            <div class="card">
                <div class="card-title"><span>🎭</span> alter ego</div>
                <div class="avatar-strip" id="avatarStrip">
                    <button class="avatar-btn" data-avatar="😥" data-name="tension">😥 <span>tension</span></button>
                    <button class="avatar-btn" data-avatar="🙉" data-name="monkey">🙉 <span>monkey</span></button>
                    <button class="avatar-btn" data-avatar="🤫🧏🏻‍♀️" data-name="sigma girl">🤫🧏🏻‍♀️ <span>sigma girl</span></button>
                    <button class="avatar-btn" data-avatar="🤫🧏🏻‍♂️" data-name="sigma boy">🤫🧏🏻‍♂️ <span>sigma boy</span></button>
                    <button class="avatar-btn" data-avatar="🥀" data-name="ts fr">🥀 <span>ts fr</span></button>
                    <button class="avatar-btn" data-avatar="🗿" data-name="nonchalant">🗿 <span>nonchalant finalboss</span></button>
                    <button class="avatar-btn" data-avatar="🏳" data-name="finalboss">🏳 <span>ts pmo sb icl</span></button>
                    <button class="avatar-btn" data-avatar="😇" data-name="peaceful">😇 <span>low cortisol</span></button>
                </div>
                <input type="text" id="usernameField" class="minimal-input" placeholder="your name" autocomplete="off" value="">
            </div>

            <div class="card">
                <div class="card-title"><span>⏱️</span> focus timer</div>
                <div class="timer-block"><div id="timer">00:00</div></div>
                <div class="button-group">
                    <button class="cute-btn" id="timerToggleBtn">▶ start</button>
                    <button class="cute-btn secondary" id="finishSessionBtn">✓ finish</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span>👥</span> online now</div>
                <div id="activeUsersList" class="active-users-wrapper">loading...</div>
                <div id="typingIndicatorArea" class="typing-indicator">✨ nobody typing...</div>
            </div>

            <div class="card">
                <div class="card-title"><span>🎯</span> my goals (only you see)</div>
                <div id="goalsList" class="goals-container"></div>
                <div class="add-goal">
                    <input type="text" id="goalInput" placeholder="add a goal...">
                    <button id="addGoalBtn">+</button>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="card">
                <div class="card-title"><span>📋</span> leaderboard</div>
                <div id="leaderboardArea" class="scroll-area">✨ no sessions</div>
            </div>

            <div class="card">
                <div class="card-title"><span>🏆</span> longest sessions</div>
                <div id="longestList" class="longest-grid">loading...</div>
            </div>

            <div class="card">
                <div class="card-title"><span>💬</span> live chat <button class="clear-chat-btn" id="clearChatBtn">clear all</button></div>
                <div id="chatArea" class="scroll-area"></div>
                <div class="input-send">
                    <input type="text" id="chatInputField" placeholder="message...">
                    <button id="sendChatBtn">→</button>
                </div>
            </div>
        </div>
    </div>
    <div class="tiny-note">⚡ live · goals are private · chat clears for everyone</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, deleteDoc, query, orderBy, limit, onSnapshot, serverTimestamp, where, getDocs, writeBatch, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
        authDomain: "styd-d1945.firebaseapp.com",
        projectId: "styd-d1945",
        storageBucket: "styd-d1945.firebasestorage.app",
        messagingSenderId: "60953296553",
        appId: "1:60953296553:web:ac86bfccdd16c915aff3b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const SESSIONS_COLLECTION = "study_sessions";
    const CHAT_COLLECTION = "chat_messages";
    const ACTIVE_USERS_COLLECTION = "active_users";
    const TYPING_COLLECTION = "typing_indicators";
    
    let currentUserId = localStorage.getItem("focusUserId");
    if (!currentUserId) {
        currentUserId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
        localStorage.setItem("focusUserId", currentUserId);
    }
    
    let currentAvatar = localStorage.getItem("liveAvatar") || "😥";
    let currentUsername = localStorage.getItem("liveUsername") || "";
    
    // If no username saved, leave empty - user must type
    if (!currentUsername) {
        currentUsername = "";
    }
    
    let currentSeconds = 0;
    let timerInterval = null;
    let isRunning = false;
    let typingTimeout = null;
    let isTypingCurrently = false;
    
    // DOM
    const usernameInput = document.getElementById('usernameField');
    const timerDisplay = document.getElementById('timer');
    const toggleBtn = document.getElementById('timerToggleBtn');
    const finishBtn = document.getElementById('finishSessionBtn');
    const chatInput = document.getElementById('chatInputField');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const leaderboardDiv = document.getElementById('leaderboardArea');
    const longestDiv = document.getElementById('longestList');
    const activeUsersDiv = document.getElementById('activeUsersList');
    const typingIndicatorSpan = document.getElementById('typingIndicatorArea');
    const connectionSpan = document.getElementById('connectionStatus');
    const darkToggle = document.getElementById('darkModeToggle');
    const chatArea = document.getElementById('chatArea');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const goalsListDiv = document.getElementById('goalsList');
    const goalInput = document.getElementById('goalInput');
    const addGoalBtn = document.getElementById('addGoalBtn');
    const clockTimeEl = document.getElementById('clockTime');
    const clockDateEl = document.getElementById('clockDate');
    
    // Clock
    function updateClock() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        const displayHours = hours % 12 || 12;
        clockTimeEl.textContent = `${displayHours}:${minutes} ${ampm}`;
        clockDateEl.textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // Goals (localStorage only - private)
    let userGoals = JSON.parse(localStorage.getItem(`goals_${currentUserId}`) || '[]');
    
    function renderGoals() {
        if (!goalsListDiv) return;
        if (userGoals.length === 0) {
            goalsListDiv.innerHTML = '<div style="padding:8px 0; text-align:center; opacity:0.5; font-size:0.7rem;">✨ add a study goal</div>';
            return;
        }
        goalsListDiv.innerHTML = userGoals.map((goal, idx) => `
            <div class="goal-item">
                <input type="checkbox" class="goal-checkbox" data-idx="${idx}" ${goal.completed ? 'checked' : ''}>
                <span class="goal-text ${goal.completed ? 'completed' : ''}">${escapeHtml(goal.text)}</span>
                <button class="goal-delete" data-idx="${idx}">✕</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.goal-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                userGoals[idx].completed = e.target.checked;
                localStorage.setItem(`goals_${currentUserId}`, JSON.stringify(userGoals));
                renderGoals();
            });
        });
        document.querySelectorAll('.goal-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                userGoals.splice(idx, 1);
                localStorage.setItem(`goals_${currentUserId}`, JSON.stringify(userGoals));
                renderGoals();
            });
        });
    }
    
    function addGoal() {
        const text = goalInput.value.trim();
        if (!text) return;
        userGoals.push({ text: text, completed: false, createdAt: Date.now() });
        localStorage.setItem(`goals_${currentUserId}`, JSON.stringify(userGoals));
        goalInput.value = '';
        renderGoals();
    }
    
    addGoalBtn.addEventListener('click', addGoal);
    goalInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addGoal(); });
    
    function formatTime(secs) {
        let mins = Math.floor(secs / 60);
        let remain = secs % 60;
        return `${mins.toString().padStart(2, '0')}:${remain.toString().padStart(2, '0')}`;
    }
    function updateTimerUI() { timerDisplay.innerText = formatTime(currentSeconds); }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        isRunning = true;
        timerInterval = setInterval(() => { if(isRunning) { currentSeconds++; updateTimerUI(); } }, 1000);
        toggleBtn.innerHTML = '⏸ pause';
        timerDisplay.classList.add('timer-pulse');
    }
    function pauseTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        isRunning = false;
        toggleBtn.innerHTML = '▶ start';
        timerDisplay.classList.remove('timer-pulse');
    }
    
    function setAvatar(emoji) {
        currentAvatar = emoji;
        localStorage.setItem("liveAvatar", currentAvatar);
        highlightAvatar();
        updateActiveUser();
    }
    function highlightAvatar() {
        document.querySelectorAll('.avatar-btn').forEach(btn => {
            if(btn.getAttribute('data-avatar') === currentAvatar) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    function setUsername(name) {
        let trimmed = name.trim();
        currentUsername = trimmed;
        localStorage.setItem("liveUsername", currentUsername);
        updateActiveUser();
    }
    
    usernameInput.value = currentUsername;
    usernameInput.addEventListener('input', (e) => setUsername(e.target.value));
    // No default "studycute" - user must type their own name
    
    async function updateActiveUser() {
        if (!currentUsername) return;
        try {
            const q = query(collection(db, ACTIVE_USERS_COLLECTION), where("userId", "==", currentUserId));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            await addDoc(collection(db, ACTIVE_USERS_COLLECTION), {
                userId: currentUserId, username: currentUsername, avatar: currentAvatar, timestamp: serverTimestamp()
            });
        } catch(e) {}
    }
    
    async function cleanupOldActiveUsers() {
        try {
            const thirtySecAgo = new Date(Date.now() - 30000);
            const q = query(collection(db, ACTIVE_USERS_COLLECTION), where("timestamp", "<", Timestamp.fromDate(thirtySecAgo)));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        } catch(e) {}
    }
    
    function explodeConfetti() {
        const emojis = ['🎉', '✨', '🌸', '⭐', '💖'];
        const count = 25;
        for(let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            confetti.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-20px';
            confetti.style.fontSize = (Math.random() * 16 + 12) + 'px';
            confetti.style.pointerEvents = 'none';
            confetti.style.zIndex = '9999';
            confetti.style.transition = 'all 0.8s ease-out';
            document.body.appendChild(confetti);
            setTimeout(() => {
                confetti.style.transform = `translateY(${Math.random() * 400 + 150}px) translateX(${(Math.random() - 0.5) * 200}px)`;
                confetti.style.opacity = '0';
            }, 10);
            setTimeout(() => confetti.remove(), 900);
        }
    }
    
    async function finishSession() {
        if(currentSeconds === 0) { addSystemMessage("run the timer first!"); return; }
        if (!currentUsername) { addSystemMessage("please enter your name first!"); return; }
        try {
            await addDoc(collection(db, SESSIONS_COLLECTION), {
                userId: currentUserId, name: currentUsername, avatar: currentAvatar,
                timeSeconds: currentSeconds, timestamp: serverTimestamp(),
                date: new Date().toISOString().slice(0,10)
            });
            addSystemMessage(`${currentUsername} studied ${formatTime(currentSeconds)}! 🎉`);
            explodeConfetti();
            currentSeconds = 0;
            updateTimerUI();
            if(isRunning) pauseTimer();
        } catch(e) { console.error(e); }
    }
    
    async function sendMessage() {
        let text = chatInput.value.trim();
        if(!text) return;
        if (!currentUsername) { addSystemMessage("please enter your name first!"); return; }
        try {
            await addDoc(collection(db, CHAT_COLLECTION), {
                userId: currentUserId, user: currentUsername, avatar: currentAvatar, text: text, timestamp: serverTimestamp()
            });
            chatInput.value = "";
            stopTyping();
        } catch(e) {}
    }
    
    async function clearAllChat() {
        if (!confirm("Clear all chat messages for everyone?")) return;
        try {
            const q = query(collection(db, CHAT_COLLECTION));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            addSystemMessage("chat cleared by admin ✨");
        } catch(e) { console.error(e); }
    }
    
    async function addSystemMessage(text, avatar = "📢") {
        try {
            await addDoc(collection(db, CHAT_COLLECTION), {
                userId: "system", user: "system", avatar: avatar, text: text, timestamp: serverTimestamp()
            });
        } catch(e) {}
    }
    
    async function startTyping() {
        if(isTypingCurrently || !currentUsername) return;
        isTypingCurrently = true;
        try {
            const q = query(collection(db, TYPING_COLLECTION), where("userId", "==", currentUserId));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            await addDoc(collection(db, TYPING_COLLECTION), {
                userId: currentUserId, username: currentUsername, avatar: currentAvatar, timestamp: serverTimestamp()
            });
        } catch(e) {}
    }
    async function stopTyping() {
        if(!isTypingCurrently) return;
        isTypingCurrently = false;
        try {
            const q = query(collection(db, TYPING_COLLECTION), where("userId", "==", currentUserId));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        } catch(e) {}
    }
    
    function setupListeners() {
        connectionSpan.innerHTML = "✅ connected";
        
        const today = new Date().toISOString().slice(0,10);
        const qSessions = query(collection(db, SESSIONS_COLLECTION), orderBy("timestamp", "desc"), limit(200));
        onSnapshot(qSessions, (snapshot) => {
            const userBest = new Map();
            snapshot.forEach(doc => {
                const s = doc.data();
                const sessionDate = s.timestamp?.toDate ? s.timestamp.toDate().toISOString().slice(0,10) : s.date;
                if(sessionDate === today && s.name) {
                    if(!userBest.has(s.userId) || userBest.get(s.userId).timeSeconds < s.timeSeconds) {
                        userBest.set(s.userId, { name: s.name, avatar: s.avatar, timeSeconds: s.timeSeconds });
                    }
                }
            });
            const leaderboard = Array.from(userBest.values()).sort((a,b) => b.timeSeconds - a.timeSeconds).slice(0,8);
            if(leaderboard.length === 0) leaderboardDiv.innerHTML = "<div style='padding:12px; text-align:center'>✨ no sessions</div>";
            else {
                leaderboardDiv.innerHTML = leaderboard.map((u, i) => {
                    let medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
                    return `<div class="leader-row"><div>${medal}</div><div>${u.avatar}</div><div style="flex:1">${escapeHtml(u.name)}</div><div>${formatTime(u.timeSeconds)}</div></div>`;
                }).join('');
            }
        });
        
        const qAll = query(collection(db, SESSIONS_COLLECTION), orderBy("timestamp", "desc"), limit(500));
        onSnapshot(qAll, (snapshot) => {
            const userBest = new Map();
            snapshot.forEach(doc => {
                const s = doc.data();
                if(s.name && (!userBest.has(s.userId) || userBest.get(s.userId).timeSeconds < s.timeSeconds)) {
                    userBest.set(s.userId, { name: s.name, avatar: s.avatar, timeSeconds: s.timeSeconds });
                }
            });
            const longest = Array.from(userBest.values()).sort((a,b) => b.timeSeconds - a.timeSeconds).slice(0,8);
            if(longest.length === 0) longestDiv.innerHTML = "<div style='padding:20px; text-align:center'>🏆 no records</div>";
            else {
                longestDiv.innerHTML = longest.map((u, i) => {
                    let medal = i===0?"👑":i===1?"🥈":i===2?"🥉":"⭐";
                    return `<div class="longest-block"><div class="longest-rank">${medal}</div><div class="longest-avatar">${u.avatar}</div><div class="longest-info"><div class="longest-name">${escapeHtml(u.name)}</div><div class="longest-time">${formatTime(u.timeSeconds)}</div></div><div>🏆</div></div>`;
                }).join('');
            }
        });
        
        const qChat = query(collection(db, CHAT_COLLECTION), orderBy("timestamp", "asc"), limit(100));
        onSnapshot(qChat, (snapshot) => {
            const messages = [];
            snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
            if(messages.length === 0) chatArea.innerHTML = "<div style='padding:12px; text-align:center'>💬 no messages</div>";
            else {
                chatArea.innerHTML = messages.map(m => {
                    let time = "";
                    if(m.timestamp?.toDate) {
                        let date = m.timestamp.toDate();
                        time = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    }
                    return `<div class="chat-message"><div class="chat-meta"><span>${m.avatar || "💬"}</span><span class="chat-user">${escapeHtml(m.user || "?")}</span><span class="chat-time">${time}</span></div><div class="chat-text">${escapeHtml(m.text || "")}</div></div>`;
                }).join('');
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        });
        
        const qActive = query(collection(db, ACTIVE_USERS_COLLECTION), orderBy("timestamp", "desc"));
        onSnapshot(qActive, (snapshot) => {
            const users = [];
            snapshot.forEach(doc => users.push(doc.data()));
            const unique = new Map();
            users.forEach(u => unique.set(u.userId, u));
            const userList = Array.from(unique.values()).filter(u => u.username);
            if(userList.length === 0) activeUsersDiv.innerHTML = "<div style='padding:8px'>👻 no one online</div>";
            else {
                activeUsersDiv.innerHTML = userList.map(u => `<div class="active-user-chip"><span class="online-dot"></span> ${u.avatar} ${escapeHtml(u.username)}</div>`).join('');
            }
        });
        
        const qTyping = query(collection(db, TYPING_COLLECTION), orderBy("timestamp", "desc"));
        onSnapshot(qTyping, (snapshot) => {
            const typing = [];
            snapshot.forEach(doc => typing.push(doc.data()));
            const others = typing.filter(t => t.userId !== currentUserId && t.username);
            if(others.length === 0) typingIndicatorSpan.innerHTML = "✨ nobody typing...";
            else {
                let names = others.map(t => `${t.avatar} ${t.username}`).join(", ");
                typingIndicatorSpan.innerHTML = `✍️ ${names} ${others.length === 1 ? "is" : "are"} typing...`;
            }
        });
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function bindEvents() {
        document.querySelectorAll('.avatar-btn').forEach(btn => {
            btn.addEventListener('click', () => setAvatar(btn.getAttribute('data-avatar')));
        });
        toggleBtn.addEventListener('click', () => { isRunning ? pauseTimer() : startTimer(); });
        finishBtn.addEventListener('click', finishSession);
        sendChatBtn.addEventListener('click', sendMessage);
        clearChatBtn.addEventListener('click', clearAllChat);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        chatInput.addEventListener('input', () => {
            if(chatInput.value.trim() && currentUsername) startTyping();
            if(typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => stopTyping(), 1500);
        });
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        });
        if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    }
    
    highlightAvatar();
    updateTimerUI();
    bindEvents();
    renderGoals();
    updateActiveUser();
    setupListeners();
    setInterval(updateActiveUser, 20000);
    setInterval(cleanupOldActiveUsers, 15000);
</script>
</body>
</html>
