<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: Inter;
  background: #0f1117;
  color: #eaeaea;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: 600;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 15px;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1a1d26;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  cursor: pointer;
}

.chat-box {
  height: 220px;
  overflow-y: auto;
  background: #151822;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  max-width: 80%;
}

.msg.me {
  background: #6c5ce7;
  align-self: flex-end;
}

.meta {
  font-size: 10px;
  opacity: 0.6;
}

small {
  opacity: 0.6;
}
</style>
</head>

<body>

<header>📚 Study Hub</header>

<div class="container">

<!-- PROFILE -->
<div class="card">
  <h3>👤 Profile</h3>
  <input id="username" placeholder="Enter name">
</div>

<!-- GOAL -->
<div class="card">
  <h3>🎯 Goal</h3>
  <input id="goal" type="number" placeholder="Minutes">
  <button onclick="setGoal()">Save Goal</button>
</div>

<!-- POMODORO -->
<div class="card">
  <h3>🍅 Pomodoro</h3>
  <div id="timer" style="font-size:40px;text-align:center;">25:00</div>
  <button onclick="start()">Start</button>
  <button onclick="reset()">Reset</button>
</div>

<!-- STREAK -->
<div class="card">
  <h3>🔥 Streak</h3>
  <div id="streak" style="font-size:30px;text-align:center;">0 days</div>
</div>

<!-- ONLINE -->
<div class="card">
  <h3>🟢 Online Users</h3>
  <div id="onlineList"></div>
</div>

<!-- CHAT -->
<div class="card">
  <h3>💬 Chat</h3>

  <div id="typing" style="font-size:12px; opacity:0.6;"></div>

  <div id="chat" class="chat-box"></div>

  <input id="message" placeholder="message...">

  <button onclick="send()">Send</button>
</div>

<!-- LEADERBOARD -->
<div class="card">
  <h3>🏆 Leaderboard</h3>
  <div id="board"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
  authDomain: "styd-d1945.firebaseapp.com",
  projectId: "styd-d1945",
  storageBucket: "styd-d1945.firebasestorage.app",
  messagingSenderId: "60953296553",
  appId: "1:60953296553:web:ac86bfccdd16c915aff3b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- HELPERS ---------------- */
function user() {
  return document.getElementById("username").value || "anon";
}

function time(ts) {
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* ---------------- ONLINE ---------------- */
setInterval(async () => {
  if (!user()) return;

  await setDoc(doc(db, "presence", user()), {
    name: user(),
    lastSeen: Date.now(),
    typing: false
  });
}, 5000);

onSnapshot(collection(db, "presence"), (snap) => {
  let list = document.getElementById("onlineList");
  list.innerHTML = "";

  snap.forEach(d => {
    let u = d.data();
    if (Date.now() - u.lastSeen < 10000) {
      list.innerHTML += "🟢 " + u.name + "<br>";
    }
  });
});

/* ---------------- CHAT ---------------- */
const chatQuery = query(collection(db, "chat"), orderBy("time"));

onSnapshot(chatQuery, (snap) => {
  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  snap.forEach(d => {
    let m = d.data();

    let div = document.createElement("div");
    div.className = "msg " + (m.name === user() ? "me" : "");

    div.innerHTML = `
      <div class="meta">${m.name} • ${time(m.time)}</div>
      <div>${m.message}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

/* typing */
let typingTimeout;

document.getElementById("message").addEventListener("input", async () => {
  await setDoc(doc(db, "presence", user()), {
    name: user(),
    typing: true,
    lastSeen: Date.now()
  }, { merge: true });

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    setDoc(doc(db, "presence", user()), {
      typing: false
    }, { merge: true });
  }, 1200);
});

/* show typing */
onSnapshot(collection(db, "presence"), (snap) => {
  let typing = [];

  snap.forEach(d => {
    let u = d.data();
    if (u.typing && u.name !== user()) typing.push(u.name);
  });

  document.getElementById("typing").innerText =
    typing.length ? typing.join(", ") + " typing..." : "";
});

/* send */
window.send = async function() {
  let msg = document.getElementById("message").value;

  if (!msg.trim()) return;

  await addDoc(collection(db, "chat"), {
    name: user(),
    message: msg,
    time: Date.now()
  });

  document.getElementById("message").value = "";
};

/* ---------------- TIMER ---------------- */
let t = 1500, i;

window.start = () => {
  i = setInterval(() => {
    t--;
    let m = Math.floor(t/60), s = t%60;
    document.getElementById("timer").innerText =
      `${m}:${s<10?"0":""}${s}`;
    if (t <= 0) clearInterval(i);
  },1000);
};

window.reset = () => {
  clearInterval(i);
  t = 1500;
};

/* ---------------- GOAL ---------------- */
window.setGoal = () => {
  localStorage.setItem("goal", document.getElementById("goal").value);
};

/* ---------------- STREAK ---------------- */
let last = localStorage.getItem("last") || "";
let streak = parseInt(localStorage.getItem("streak") || 0);

let today = new Date().toDateString();

if (last !== today) {
  streak++;
  localStorage.setItem("streak", streak);
  localStorage.setItem("last", today);
}

document.getElementById("streak").innerText = streak + " days";

</script>

</body>
</html>
