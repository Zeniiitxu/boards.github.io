<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Tracker</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  text-align: center;
}
.container {
  padding: 20px;
}
button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
  cursor: pointer;
}
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
.chat-box {
  height: 150px;
  overflow-y: auto;
  border: 1px solid white;
  margin: 10px;
  padding: 10px;
}
</style>
</head>

<body>
<div class="container">
<h1>📚 Study Tracker</h1>

<!-- USER -->
<input id="username" placeholder="Enter name">

<!-- GOAL -->
<h3>🎯 Study Goal (minutes)</h3>
<input id="goal" type="number">
<button onclick="setGoal()">Set Goal</button>
<p id="goalStatus"></p>

<!-- TIMER -->
<h3>🍅 Pomodoro</h3>
<p id="timer">25:00</p>
<button onclick="startPomodoro()">Start</button>
<button onclick="resetPomodoro()">Reset</button>

<!-- STREAK -->
<h3>🔥 Streak</h3>
<p id="streak">0 days</p>

<!-- LEADERBOARD -->
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>

<!-- CHAT -->
<h3>💬 Chat</h3>
<div class="chat-box" id="chat"></div>
<input id="message">
<button onclick="sendMessage()">Send</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
  authDomain: "styd-d1945.firebaseapp.com",
  projectId: "styd-d1945",
  storageBucket: "styd-d1945.firebasestorage.app",
  messagingSenderId: "60953296553",
  appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
  measurementId: "G-K8ZQJ0PEN5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- GOAL ---------------- */
window.setGoal = function() {
  let goal = document.getElementById("goal").value;
  localStorage.setItem("goal", goal);
  document.getElementById("goalStatus").innerText = "Goal: " + goal + " mins";
};

/* ---------------- POMODORO ---------------- */
let time = 1500;
let interval;

function updateTimer() {
  let m = Math.floor(time / 60);
  let s = time % 60;
  document.getElementById("timer").innerText =
    m + ":" + (s < 10 ? "0" : "") + s;
}

window.startPomodoro = function() {
  interval = setInterval(() => {
    time--;
    updateTimer();

    if (time <= 0) {
      clearInterval(interval);
      alert("Session done!");
      updateStudyTime();
    }
  }, 1000);
};

window.resetPomodoro = function() {
  clearInterval(interval);
  time = 1500;
  updateTimer();
};

/* ---------------- STUDY TIME + LEADERBOARD ---------------- */
async function updateStudyTime() {
  let user = document.getElementById("username").value || "anon";

  await addDoc(collection(db, "leaderboard"), {
    name: user,
    time: 25,
    date: new Date().toDateString()
  });

  loadLeaderboard();
  updateStreak();
}

async function loadLeaderboard() {
  const q = query(collection(db, "leaderboard"), orderBy("time", "desc"));
  const snapshot = await getDocs(q);

  let list = document.getElementById("leaderboard");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();
    let li = document.createElement("li");
    li.innerText = data.name + " - " + data.time + " mins";
    list.appendChild(li);
  });
}

loadLeaderboard();

/* ---------------- STREAK ---------------- */
function updateStreak() {
  let last = localStorage.getItem("lastStudy");
  let today = new Date().toDateString();
  let streak = parseInt(localStorage.getItem("streak") || "0");

  if (last !== today) {
    streak++;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastStudy", today);

  document.getElementById("streak").innerText = streak + " days";
}

document.getElementById("streak").innerText =
  (localStorage.getItem("streak") || 0) + " days";

/* ---------------- CHAT ---------------- */
window.sendMessage = async function() {
  let msg = document.getElementById("message").value;
  let user = document.getElementById("username").value || "anon";

  await addDoc(collection(db, "chat"), {
    name: user,
    message: msg
  });

  loadChat();
};

async function loadChat() {
  const snapshot = await getDocs(collection(db, "chat"));

  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();
    let p = document.createElement("p");
    p.innerText = data.name + ": " + data.message;
    chat.appendChild(p);
  });
}

setInterval(loadChat, 2000);

/* ---------------- IDLE REMINDER ---------------- */
let lastMove = Date.now();

document.onmousemove = () => lastMove = Date.now();

setInterval(() => {
  if (Date.now() - lastMove > 60000) {
    alert("⏰ Get back to studying!");
  }
}, 10000);

</script>
</body>
</html>
