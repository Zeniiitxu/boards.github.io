<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Hub</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --accent: #6c5ce7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 450px; }
        
        .card { background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #b2bec3; margin-bottom: 15px; }
        
        #timer { font-size: 4rem; font-weight: 300; text-align: center; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; background: #f0f0f0; transition: 0.2s; }
        button.primary { background: var(--accent); color: white; }
        button:active { transform: scale(0.95); }
        
        .chat-box { height: 200px; overflow-y: auto; font-size: 0.9rem; }
        input { width: 100%; border: none; background: #f9f9f9; padding: 12px; border-radius: 12px; box-sizing: border-box; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <input id="username" placeholder="Name" style="text-align: center; font-weight: bold; margin-bottom: 20px;">

    <div class="card">
        <div id="timer">00:00</div>
        <div class="controls">
            <button id="toggleBtn" onclick="toggleTimer()">Start</button>
            <button onclick="resetTimer()">Stop</button>
            <button class="primary" onclick="saveSession()">Finish</button>
        </div>
    </div>

    <h3>Leaderboard</h3>
    <div id="leaderboard" class="card" style="min-height: 50px;"></div>

    <h3>Chat</h3>
    <div id="chat" class="card chat-box"></div>
    <input id="message" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // Config - PENDING YOUR INPUT
    const firebaseConfig = { /* PASTE HERE */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    // Name Persist
    const nameInput = document.getElementById('username');
    nameInput.value = localStorage.getItem("username") || "Guest";
    nameInput.oninput = (e) => localStorage.setItem("username", e.target.value);

    // Timer logic
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        const btn = document.getElementById('toggleBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Resume";
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
            }, 1000);
            btn.innerText = "Pause";
        }
    };

    window.resetTimer = () => {
        clearInterval(timerInterval);
        timerInterval = null;
        seconds = 0;
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('toggleBtn').innerText = "Start";
    };

    window.saveSession = async () => {
        if(seconds < 60) return alert("Session too short!");
        await addDoc(collection(db, "sessions"), { name: nameInput.value, time: seconds, timestamp: serverTimestamp() });
        resetTimer();
    };

    // Data Loaders
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc")), (snap) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = snap.docs.map(d => `<div style="margin-bottom:8px"><b>${d.data().name}</b>: ${Math.floor(d.data().time/60)}m</div>`).join('');
    });

    window.sendMessage = async () => {
        const input = document.getElementById('message');
        if(!input.value) return;
        await addDoc(collection(db, "chat"), { user: nameInput.value, text: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        const div = document.getElementById('chat');
        div.innerHTML = snap.docs.map(d => `<div><b>${d.data().user}:</b> ${d.data().text}</div>`).join('');
        div.scrollTop = div.scrollHeight;
    });
</script>
</body>
</html>
