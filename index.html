<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Co-Study Hub</title>
    <style>
        :root { 
            --bg: #e6e4eb; 
            --card: #ffffff; 
            --accent: #8e88a3; 
            --text: #4a455a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* New Widgets */
        #quote-box { font-style: italic; color: var(--accent); font-size: 0.9rem; text-align: center; }
        .mood-selector { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        
        /* Elements */
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #d1ceda; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #timer { font-size: 3.5rem; font-weight: 200; text-align: center; color: var(--accent); }
        .chat-box { height: 250px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="quote-box">"Success is the sum of small efforts, repeated."</div>

    <div class="card">
        <input id="username" placeholder="Your Name">
        <select id="mood">
            <option value="📚">Studying 📚</option>
            <option value="🧠">Deep Work 🧠</option>
            <option value="☕">Coffee Break ☕</option>
            <option value="🎧">Focus Beats 🎧</option>
        </select>
        <input id="goal" placeholder="What is your goal today?">
        
        <div id="timer">00:00</div>
        <button id="toggleBtn" onclick="toggleTimer()">Start Focus</button>
    </div>

    <h3>🏆 Study Circle</h3>
    <div id="leaderboard" class="card"></div>

    <h3>💬 Live Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Send a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = { /* PASTE CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Save inputs to LocalStorage
    document.getElementById('username').oninput = (e) => localStorage.setItem("username", e.target.value);
    document.getElementById('username').value = localStorage.getItem("username") || "";

    // Timer logic
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        const btn = document.getElementById('toggleBtn');
        const mood = document.getElementById('mood').value;
        const goal = document.getElementById('goal').value;

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Start Focus";
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
            }, 1000);
            btn.innerText = "Pause";
        }
    };

    // Leaderboard logic with Mood and Goal
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc")), (snap) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            div.innerHTML += `<div>${data.mood} <b>${data.name}</b>: ${data.goal}</div>`;
        });
    });

    // Chat
    window.sendMessage = async () => {
        const msg = document.getElementById("message").value;
        const name = localStorage.getItem("username") || "Guest";
        if (!msg) return;
        await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: serverTimestamp() });
        document.getElementById("message").value = "";
    };
</script>
</body>
</html>
