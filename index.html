<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Study Hub</title>
    <style>
        :root { --primary: #7c4dff; --bg: #f5f7fa; --bubble-me: #7c4dff; --bubble-other: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #timer { font-size: 3rem; font-weight: bold; color: var(--primary); text-align: center; }
        .chat-box { height: 300px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #eee; }
        .bubble { padding: 10px 15px; border-radius: 18px; margin: 8px 0; max-width: 80%; word-wrap: break-word; }
        .my-bubble { background: var(--bubble-me); color: white; align-self: flex-end; margin-left: auto; }
        .other-bubble { background: var(--bubble-other); color: #333; align-self: flex-start; }
        
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <input id="username" placeholder="Enter your name to start...">
    <div id="timer">00:00</div>
    <button id="toggleBtn" onclick="toggleTimer()">Start Focus</button>

    <h3>Study Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // 1. YOUR CONFIG (Make sure this matches your Firebase project exactly)
    const firebaseConfig = {
        apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
        authDomain: "styd-d1945.firebaseapp.com",
        projectId: "styd-d1945",
        storageBucket: "styd-d1945.firebasestorage.app",
        messagingSenderId: "60953296553",
        appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
        measurementId: "G-K8ZQJ0PEN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. PERSISTENCE: Save name automatically
    const nameInput = document.getElementById('username');
    nameInput.value = localStorage.getItem("username") || "";
    nameInput.oninput = (e) => localStorage.setItem("username", e.target.value);

    // 3. TIMER
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        const btn = document.getElementById('toggleBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Start Focus";
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
            }, 1000);
            btn.innerText = "Pause";
        }
    };

    // 4. CHAT
    window.sendMessage = async () => {
        const msg = document.getElementById("message").value;
        const name = localStorage.getItem("username") || "Guest";
        if (!msg) return;
        
        try {
            await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: serverTimestamp() });
            document.getElementById("message").value = "";
        } catch (e) {
            alert("Error sending: " + e.message);
        }
    };

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === localStorage.getItem("username");
            chat.innerHTML += `<div class="bubble ${isMe ? 'my-bubble' : 'other-bubble'}"><b>${data.user}:</b> ${data.text}</div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
