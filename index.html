<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Study Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2c2c54; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, button { padding: 12px; margin: 8px; border-radius: 8px; border: none; }
        button { background: #6c5ce7; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #a29bfe; }
        .chat-box { height: 200px; overflow-y: auto; border: 1px solid #444; margin: 10px 0; padding: 10px; text-align: left; background: #1e1e2f; border-radius: 5px; }
        #timer { font-size: 3rem; margin: 15px 0; font-weight: bold; color: #fab1a0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Co-Study App</h1>
    <input id="username" placeholder="Enter your name">
    
    <div id="timer">25:00</div>
    <button onclick="startPomodoro()">Start Focus</button>
    <button onclick="resetPomodoro()">Reset</button>

    <h3>🏆 Leaderboard (Live)</h3>
    <ul id="leaderboard" style="list-style: none; padding: 0;"></ul>

    <h3>💬 Study Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    // 1. IMPORT FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // Your provided credentials
    const firebaseConfig = {
        apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
        authDomain: "styd-d1945.firebaseapp.com",
        projectId: "styd-d1945",
        storageBucket: "styd-d1945.firebasestorage.app",
        messagingSenderId: "60953296553",
        appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
        measurementId: "G-K8ZQJ0PEN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. TIMER LOGIC
    let time = 1500;
    let interval;

    window.startPomodoro = function() {
        if (interval) return;
        interval = setInterval(() => {
            time--;
            document.getElementById("timer").innerText = 
                `${Math.floor(time/60)}:${(time%60).toString().padStart(2, '0')}`;
            if (time <= 0) {
                clearInterval(interval);
                interval = null;
                alert("Session Complete!");
                saveSession();
            }
        }, 1000);
    };

    window.resetPomodoro = function() {
        clearInterval(interval);
        interval = null;
        time = 1500;
        document.getElementById("timer").innerText = "25:00";
    };

    async function saveSession() {
        const name = document.getElementById("username").value || "Anonymous";
        await addDoc(collection(db, "stats"), { name, time: 25, timestamp: new Date() });
    }

    // 3. REAL-TIME LEADERBOARD
    const q = query(collection(db, "stats"), orderBy("timestamp", "desc"), limit(5));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById("leaderboard");
        list.innerHTML = "";
        snapshot.forEach(doc => {
            list.innerHTML += `<li>✨ ${doc.data().name} studied 25 mins</li>`;
        });
    });

    // 4. REAL-TIME CHAT
    window.sendMessage = async function() {
        const msg = document.getElementById("message").value;
        const name = document.getElementById("username").value || "Anonymous";
        if (!msg) return;
        await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: new Date() });
        document.getElementById("message").value = "";
    };

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snapshot) => {
        const chatBox = document.getElementById("chat");
        chatBox.innerHTML = "";
        snapshot.forEach(doc => {
            chatBox.innerHTML += `<div><b>${doc.data().user}:</b> ${doc.data().text}</div>`;
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
