<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Study Hub</title>
    <style>
        :root { 
            --bg: #e6e4eb; 
            --card: #ffffff; 
            --accent: #8e88a3; 
            --text: #4a455a; 
            --bubble-me: #8e88a3;
            --bubble-other: #d1ceda;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        #timer { font-size: 3.5rem; font-weight: 200; text-align: center; color: var(--accent); margin: 10px 0; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #d1ceda; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .chat-box { height: 250px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; display: flex; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 80%; }
        .my-bubble { background: var(--bubble-me); color: white; align-self: flex-end; }
        .other-bubble { background: var(--bubble-other); color: var(--text); align-self: flex-start; }
        
        .list-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <input id="username" placeholder="Your Name">
        <select id="mood">
            <option value="📚">Studying 📚</option>
            <option value="🧠">Deep Work 🧠</option>
            <option value="☕">Coffee Break ☕</option>
            <option value="🎧">Focus Beats 🎧</option>
        </select>
        <input id="goal" placeholder="Today's Goal...">
        
        <div id="timer">00:00</div>
        <button id="toggleBtn" onclick="toggleTimer()">Start Focus</button>
        <button onclick="saveSession()" style="background:#5e5a6e;">Finish & Save</button>
    </div>

    <h3>🏆 Leaderboard</h3>
    <div id="leaderboard" class="card"></div>

    <h3>💬 Live Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Send a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // PASTE YOUR CONFIG HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Save Name Persistence
    const nameInput = document.getElementById('username');
    nameInput.value = localStorage.getItem("username") || "";
    nameInput.oninput = (e) => localStorage.setItem("username", e.target.value);

    // Timer Logic
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        const btn = document.getElementById('toggleBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Start Focus";
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
            }, 1000);
            btn.innerText = "Pause";
        }
    };

    // Save Session to Leaderboard
    window.saveSession = async () => {
        if (seconds === 0) return alert("Nothing to save yet!");
        const name = localStorage.getItem("username") || "Guest";
        await addDoc(collection(db, "sessions"), { 
            name, mood: document.getElementById('mood').value, 
            goal: document.getElementById('goal').value, 
            time: seconds, timestamp: serverTimestamp() 
        });
        seconds = 0;
        document.getElementById('timer').innerText = "00:00";
        alert("Saved to Leaderboard!");
    };

    // Live Leaderboard Listener
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc")), (snap) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            div.innerHTML += `<div class="list-item">${data.mood} <b>${data.name}</b>: ${Math.floor(data.time/60)}m (${data.goal})</div>`;
        });
    });

    // Chat Logic
    window.sendMessage = async () => {
        const msg = document.getElementById("message").value;
        const name = localStorage.getItem("username") || "Guest";
        if (!msg) return;
        await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: serverTimestamp() });
        document.getElementById("message").value = "";
    };

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === localStorage.getItem("username");
            chat.innerHTML += `<div class="bubble ${isMe ? 'my-bubble' : 'other-bubble'}"><b>${data.user}:</b> ${data.text}</div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
