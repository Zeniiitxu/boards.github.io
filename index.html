<!DOCTYPE html>
<html>
<body>
    <h1 id="header">Waiting...</h1>
    <button id="btn">Click me</button>

    <script>
        document.getElementById('btn').addEventListener('click', () => {
            document.getElementById('header').innerText = "IT WORKS!";
            alert("The JavaScript is running!");
        });
    </script>
</body>
</html>
