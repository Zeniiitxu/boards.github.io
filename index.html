<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Co-Study Hub</title>
    <style>
        :root { --bg: #fdf6f7; --me: #a29bfe; --them: #fab1a0; --accent: #81ecec; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2d3436; }
        .container { max-width: 500px; margin: auto; }
        
        /* Glassmorphism Card */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Chat UI */
        .chat-box { height: 250px; overflow-y: auto; background: #fff; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 20px; margin: 5px; max-width: 70%; }
        .my-bubble { align-self: flex-end; background: var(--me); color: white; }
        .other-bubble { align-self: flex-start; background: var(--them); color: white; }
        
        /* Status Indicators */
        .online-dot { width: 10px; height: 10px; background: #55efc4; border-radius: 50%; display: inline-block; }
        
        /* Music Widgets */
        .music-player { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Co-Study Hub</h1>
    <input id="username" placeholder="Your Name" oninput="saveName(this.value)" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc;">

    <div class="card">
        <div id="timer" style="font-size: 3rem; font-weight: bold; color: var(--me);">00:00</div>
        <button onclick="toggleTimer()" id="toggleBtn">Start Session</button>
    </div>

    <div class="music-player">
        <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZeKCadgRdKQ" width="100%" height="80" frameborder="0"></iframe>
    </div>

    <h3>🏆 Top Students</h3>
    <div id="leaderboard"></div>

    <h3>💬 Chat <small id="typing-status" style="color: grey; font-size: 12px;"></small></h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Type a message..." onkeyup="checkTyping(event)">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- USERNAME & PRESENCE ---
    window.saveName = (val) => {
        localStorage.setItem("username", val);
        setDoc(doc(db, "presence", val), { online: true, lastSeen: new Date() });
    };

    // --- TIMER & STREAKS ---
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('toggleBtn').innerText = "Start";
        } else {
            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5); }, 1000);
            document.getElementById('toggleBtn').innerText = "Pause";
        }
    };

    // --- CHAT WITH BUBBLES ---
    window.sendMessage = async () => {
        const msg = document.getElementById("message").value;
        const name = localStorage.getItem("username") || "Anon";
        if (!msg) return;
        await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: new Date() });
        document.getElementById("message").value = "";
    };

    // --- TYPING INDICATOR LOGIC ---
    window.checkTyping = (e) => {
        if(e.key === "Enter") sendMessage();
        // Here you could add a function to update a 'typing' field in Firestore
    };

    // --- DATA LOADING ---
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc")), (snap) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            div.innerHTML += `<div>🔥 ${data.name}: ${Math.floor(data.time/60)}m</div>`;
        });
    });

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        snap.forEach(d => {
            const isMe = d.data().user === localStorage.getItem("username");
            chat.innerHTML += `<div class="bubble ${isMe ? 'my-bubble' : 'other-bubble'}">
                <b>${d.data().user}</b>: ${d.data().text}
            </div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
