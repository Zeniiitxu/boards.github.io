<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0f1117;
  color: #e6e6e6;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 15px;
  backdrop-filter: blur(10px);
}

h3 {
  margin-top: 0;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1a1d26;
  color: white;
}

/* BUTTON */
button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: #7d6cf0;
}

/* TIMER */
.timer {
  font-size: 40px;
  text-align: center;
  margin: 10px 0;
}

/* LISTS */
ul {
  list-style: none;
  padding: 0;
}
li {
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* CHAT */
.chat-box {
  height: 180px;
  overflow-y: auto;
  padding: 10px;
  background: #151822;
  border-radius: 10px;
  font-size: 14px;
}

small {
  opacity: 0.6;
}
</style>
</head>

<body>

<header>📚 Study Dashboard</header>

<div class="container">

  <!-- USER -->
  <div class="card">
    <h3>👤 Profile</h3>
    <input id="username" placeholder="Your name">
    <small>Used for leaderboard & chat</small>
  </div>

  <!-- GOAL -->
  <div class="card">
    <h3>🎯 Daily Goal</h3>
    <input id="goal" type="number" placeholder="Minutes">
    <button onclick="setGoal()">Save Goal</button>
    <p id="goalStatus"></p>
  </div>

  <!-- TIMER -->
  <div class="card">
    <h3>🍅 Pomodoro</h3>
    <div class="timer" id="timer">25:00</div>
    <button onclick="startPomodoro()">Start</button>
    <button onclick="resetPomodoro()">Reset</button>
  </div>

  <!-- STREAK -->
  <div class="card">
    <h3>🔥 Streak</h3>
    <div class="timer" id="streak">0 days</div>
  </div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h3>💬 Study Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
  authDomain: "styd-d1945.firebaseapp.com",
  projectId: "styd-d1945",
  storageBucket: "styd-d1945.firebasestorage.app",
  messagingSenderId: "60953296553",
  appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
  measurementId: "G-K8ZQJ0PEN5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- GOAL ---------------- */
window.setGoal = function () {
  let g = document.getElementById("goal").value;
  localStorage.setItem("goal", g);
  document.getElementById("goalStatus").innerText = "Goal: " + g + " min/day";
};

/* ---------------- TIMER ---------------- */
let time = 1500;
let interval;

function renderTimer() {
  let m = Math.floor(time / 60);
  let s = time % 60;
  document.getElementById("timer").innerText =
    `${m}:${s < 10 ? "0" : ""}${s}`;
}

window.startPomodoro = function () {
  interval = setInterval(() => {
    time--;
    renderTimer();
    if (time <= 0) {
      clearInterval(interval);
      alert("Session done!");
      addStudy();
    }
  }, 1000);
};

window.resetPomodoro = function () {
  clearInterval(interval);
  time = 1500;
  renderTimer();
};

/* ---------------- FIREBASE LEADERBOARD ---------------- */
async function addStudy() {
  let user = document.getElementById("username").value || "anon";

  await addDoc(collection(db, "leaderboard"), {
    name: user,
    time: 25
  });

  loadLeaderboard();
  updateStreak();
}

async function loadLeaderboard() {
  let q = query(collection(db, "leaderboard"), orderBy("time", "desc"));
  let snap = await getDocs(q);

  let list = document.getElementById("leaderboard");
  list.innerHTML = "";

  snap.forEach(d => {
    let li = document.createElement("li");
    li.innerText = `${d.data().name} — ${d.data().time} min`;
    list.appendChild(li);
  });
}
loadLeaderboard();

/* ---------------- STREAK ---------------- */
function updateStreak() {
  let last = localStorage.getItem("last");
  let today = new Date().toDateString();
  let s = parseInt(localStorage.getItem("streak") || 0);

  if (last !== today) s++;

  localStorage.setItem("streak", s);
  localStorage.setItem("last", today);

  document.getElementById("streak").innerText = s + " days";
}

document.getElementById("streak").innerText =
  (localStorage.getItem("streak") || 0) + " days";

/* ---------------- CHAT ---------------- */
window.sendMessage = async function () {
  let msg = document.getElementById("message").value;
  let user = document.getElementById("username").value || "anon";

  await addDoc(collection(db, "chat"), {
    name: user,
    message: msg
  });

  loadChat();
};

async function loadChat() {
  let snap = await getDocs(collection(db, "chat"));
  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  snap.forEach(d => {
    let p = document.createElement("p");
    p.innerText = `${d.data().name}: ${d.data().message}`;
    chat.appendChild(p);
  });
}
setInterval(loadChat, 2000);

</script>
</body>
</html>
