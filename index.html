<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  height: 100vh;
}

.panel {
  padding: 12px;
  overflow-y: auto;
  border-right: 1px solid #1e293b;
}

h2 {
  font-size: 16px;
  margin-bottom: 10px;
  color: #60a5fa;
}

/* CHAT */
.chat-box {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #111827;
  border-radius: 8px;
}

.msg {
  margin-bottom: 8px;
  padding: 6px;
  background: #1f2937;
  border-radius: 6px;
  font-size: 14px;
}

.input-row {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  margin-left: 6px;
  padding: 8px 12px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.small {
  font-size: 12px;
  color: #94a3b8;
}

/* USERS */
.user {
  padding: 6px;
  background: #1f2937;
  margin-bottom: 6px;
  border-radius: 6px;
}

/* TIMER */
.timer {
  text-align: center;
  font-size: 28px;
  margin: 10px 0;
}

.center {
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT: USERS -->
<div class="panel">
  <h2>Online Users</h2>
  <div id="users"></div>
</div>

<!-- MIDDLE: CHAT -->
<div class="panel">
  <h2>Chat</h2>

  <div class="chat-box">
    <div id="messages" class="messages"></div>
    <div id="typing" class="small"></div>

    <div class="input-row">
      <input id="msgInput" placeholder="Message..." />
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<!-- RIGHT: TIMER + LEADERBOARD -->
<div class="panel">

  <h2>Study Timer</h2>
  <div class="timer" id="timer">00:00:00</div>

  <div class="center">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="endSession()">End</button>
  </div>

  <h2>Leaderboard</h2>
  <div id="leaderboard"></div>

  <h2>Sessions</h2>
  <div id="sessions"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getDatabase, ref, set, push, onValue, onDisconnect
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
  authDomain: "styd-d1945.firebaseapp.com",
  projectId: "styd-d1945",
  storageBucket: "styd-d1945.firebasestorage.app",
  messagingSenderId: "60953296553",
  appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
  measurementId: "G-K8ZQJ0PEN5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;
let name = "User-" + Math.floor(Math.random()*9999);

/* ===== AUTH ===== */
signInAnonymously(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;

    // presence system
    set(ref(db, "online/" + uid), {
      name,
      status: "online"
    });

    onDisconnect(ref(db, "online/" + uid)).remove();
  }
});

/* ===== CHAT ===== */
function sendMsg() {
  const text = document.getElementById("msgInput").value;
  if (!text) return;

  push(ref(db, "messages"), {
    text,
    name,
    time: Date.now()
  });

  setTyping(false);
  document.getElementById("msgInput").value = "";
}

window.sendMsg = sendMsg;

/* messages */
onValue(ref(db, "messages"), (snap) => {
  const box = document.getElementById("messages");
  box.innerHTML = "";
  snap.forEach(c => {
    const m = c.val();
    const d = new Date(m.time).toLocaleTimeString();
    box.innerHTML += `
      <div class="msg">
        <b>${m.name}</b>: ${m.text}
        <div class="small">${d}</div>
      </div>
    `;
  });
});

/* typing */
let typingTimeout;
document.getElementById("msgInput").addEventListener("input", () => {
  setTyping(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => setTyping(false), 1000);
});

function setTyping(state) {
  set(ref(db, "typing/" + uid), state ? name : null);
}

onValue(ref(db, "typing"), (snap) => {
  let txt = "";
  snap.forEach(c => {
    if (c.val()) txt += c.val() + " is typing... ";
  });
  document.getElementById("typing").innerText = txt;
});

/* online users */
onValue(ref(db, "online"), (snap) => {
  const box = document.getElementById("users");
  box.innerHTML = "";
  snap.forEach(c => {
    box.innerHTML += `<div class="user">${c.val().name}</div>`;
  });
});

/* ===== TIMER ===== */
let startTime = 0;
let elapsed = 0;
let running = false;
let interval;

function format(ms) {
  let s = Math.floor(ms/1000);
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let sec = s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function updateTimer() {
  document.getElementById("timer").innerText = format(elapsed);
}

function startTimer() {
  if (running) return;
  running = true;
  startTime = Date.now() - elapsed;

  interval = setInterval(() => {
    elapsed = Date.now() - startTime;
    updateTimer();
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(interval);
}

function endSession() {
  pauseTimer();

  push(ref(db, "sessions"), {
    name,
    time: elapsed,
    date: Date.now()
  });

  elapsed = 0;
  updateTimer();
}

window.startTimer = startTimer;
window.pauseTimer = pauseTimer;
window.endSession = endSession;

/* sessions */
onValue(ref(db, "sessions"), (snap) => {
  const box = document.getElementById("sessions");
  box.innerHTML = "";
  let total = {};

  snap.forEach(c => {
    const s = c.val();
    const mins = Math.floor(s.time/60000);

    total[s.name] = (total[s.name] || 0) + s.time;

    box.innerHTML += `
      <div class="msg">
        ${s.name} studied ${mins} min
      </div>
    `;
  });

  /* leaderboard */
  const lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  Object.entries(total)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([n,t])=>{
      lb.innerHTML += `<div class="user">${n}: ${Math.floor(t/60000)} min</div>`;
    });
});
</script>

</body>
</html>
