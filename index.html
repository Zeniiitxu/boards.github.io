<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Hub</title>
    <style>
        :root { --bg: #f4f4f9; --card: #ffffff; --text: #2d3436; --accent: #6c5ce7; }
        .dark-mode { --bg: #2d3436; --card: #353b48; --text: #f5f6fa; --accent: #a29bfe; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background: var(--card); color: var(--text); }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; background: var(--accent); color: white; cursor: pointer; margin-top: 5px; }
        #timer { font-size: 3rem; text-align: center; margin: 15px 0; font-family: monospace; }
        .chat-box { height: 150px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<button onclick="document.body.classList.toggle('dark-mode')">Toggle Dark Mode</button>

<input id="username" placeholder="Enter Name">

<div class="card">
    <div id="timer">00:00</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
        <button onclick="toggleTimer()">Start/Pause</button>
        <button onclick="resetTimer()">Stop</button>
        <button onclick="saveSession()">Finish</button>
    </div>
    <p style="text-align:center;">🔥 Streak: <span id="streak-count">0</span> days</p>
</div>

<div class="card">
    <h3>Online Now</h3>
    <div id="online-list"></div>
</div>

<div class="card">
    <h3>Chat</h3>
    <div id="chat" class="chat-box"></div>
    <input id="message" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // 1. YOUR CONFIG
    const firebaseConfig = { 
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const nameInput = document.getElementById('username');
    nameInput.value = localStorage.getItem("username") || "Guest";
    nameInput.oninput = (e) => localStorage.setItem("username", e.target.value);

    // 2. LOGIC
    let seconds = 0, interval = null;
    window.toggleTimer = () => {
        if (interval) { clearInterval(interval); interval = null; }
        else { interval = setInterval(() => { seconds++; document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5); }, 1000); }
    };
    window.resetTimer = () => { clearInterval(interval); interval = null; seconds = 0; document.getElementById('timer').innerText = "00:00"; };

    window.saveSession = async () => {
        await addDoc(collection(db, "sessions"), { name: nameInput.value, time: seconds, timestamp: serverTimestamp() });
        let s = parseInt(localStorage.getItem("streak") || 0) + 1;
        localStorage.setItem("streak", s);
        document.getElementById("streak-count").innerText = s;
        resetTimer();
    };

    window.sendMessage = async () => {
        const msg = document.getElementById('message');
        await addDoc(collection(db, "chat"), { user: nameInput.value, text: msg.value, timestamp: serverTimestamp() });
        msg.value = "";
    };

    // 3. LISTENERS
    setInterval(() => setDoc(doc(db, "online", nameInput.value), { lastSeen: Date.now() }), 5000);
    onSnapshot(collection(db, "online"), (snap) => document.getElementById('online-list').innerHTML = snap.docs.map(d => `<div>● ${d.id}</div>`).join(''));
    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => document.getElementById('chat').innerHTML = snap.docs.map(d => `<div><b>${d.data().user}:</b> ${d.data().text}</div>`).join(''));
</script>
</body>
</html>
