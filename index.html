<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Co-Study Simple</title>
    <style>
        body { font-family: sans-serif; background: #1e1e2f; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2c2c54; padding: 20px; border-radius: 15px; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
        #timer { font-size: 3rem; margin: 20px; color: #fab1a0; }
        .chat-box { height: 150px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin: 10px 0; text-align: left; background: #1e1e2f; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Co-Study Simple</h1>
    <input id="username" placeholder="Enter your name" oninput="saveName(this.value)">
    
    <div id="timer">00:00:00</div>
    <button onclick="toggleTimer()" id="toggleBtn">Start</button>
    <button onclick="saveSession()">Save Session</button>

    <h3>🏆 Leaderboard</h3>
    <div class="chat-box" id="leaderboard"></div>

    <h3>💬 Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
        authDomain: "styd-d1945.firebaseapp.com",
        projectId: "styd-d1945",
        storageBucket: "styd-d1945.firebasestorage.app",
        messagingSenderId: "60953296553",
        appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
        measurementId: "G-K8ZQJ0PEN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- USERNAME PERSISTENCE ---
    window.saveName = (val) => localStorage.setItem("username", val);
    document.getElementById("username").value = localStorage.getItem("username") || "";

    // --- TIMER LOGIC ---
    let seconds = 0, timerInterval = null;
    window.toggleTimer = () => {
        const btn = document.getElementById('toggleBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Resume";
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(11, 8);
            }, 1000);
            btn.innerText = "Pause";
        }
    };

    window.saveSession = async () => {
        const name = localStorage.getItem("username") || "Anonymous";
        await addDoc(collection(db, "sessions"), { name, time: seconds, timestamp: new Date() });
        seconds = 0;
        document.getElementById('timer').innerText = "00:00:00";
    };

    // --- REALTIME UPDATES ---
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc"), limit(5)), (snap) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = "";
        snap.forEach(d => div.innerHTML += `<div><b>${d.data().name}</b>: ${Math.floor(d.data().time/60)}m</div>`);
    });

    window.sendMessage = async () => {
        const msg = document.getElementById("message").value;
        const name = localStorage.getItem("username") || "Anonymous";
        await addDoc(collection(db, "chat"), { text: msg, user: name, timestamp: new Date() });
        document.getElementById("message").value = "";
    };

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        const div = document.getElementById('chat');
        div.innerHTML = "";
        snap.forEach(d => div.innerHTML += `<div><b>${d.data().user}:</b> ${d.data().text}</div>`);
        div.scrollTop = div.scrollHeight;
    });
</script>
</body>
</html>
