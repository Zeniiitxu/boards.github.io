<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <style>
        /* CSS: Clean, Minimalist Styling */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 400px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #f4f4f9; 
            color: #333;
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0; 
            border: none; 
            border-radius: 8px; 
            background: #6c5ce7; 
            color: white; 
            cursor: pointer; 
            font-weight: 600;
        }
        #timer { 
            font-size: 3.5rem; 
            text-align: center; 
            margin: 20px 0; 
            font-variant-numeric: tabular-nums; 
        }
        #leaderboard, #chat { 
            height: 150px; 
            overflow-y: auto; 
            font-size: 0.9rem; 
        }
        h3 { font-size: 0.8rem; text-transform: uppercase; color: #888; }
    </style>
</head>
<body>

<input id="username" placeholder="Your Name">

<div class="card">
    <div id="timer">00:00</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
        <button id="toggleBtn" onclick="toggleTimer()">Start</button>
        <button onclick="resetTimer()">Stop</button>
        <button onclick="saveSession()">Finish</button>
    </div>
</div>

<div class="card">
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

<div class="card">
    <h3>Chat</h3>
    <div id="chat"></div>
    <input id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // 1. CONFIGURATION
    const firebaseConfig = { 
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // 2. LOGIC
    let seconds = 0, interval = null;

    window.toggleTimer = () => {
        if (interval) { 
            clearInterval(interval); interval = null; 
            document.getElementById('toggleBtn').innerText = "Start"; 
        } else { 
            interval = setInterval(() => { 
                seconds++; 
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5); 
            }, 1000); 
            document.getElementById('toggleBtn').innerText = "Pause"; 
        }
    };

    window.resetTimer = () => { 
        clearInterval(interval); interval = null; 
        seconds = 0; 
        document.getElementById('timer').innerText = "00:00"; 
        document.getElementById('toggleBtn').innerText = "Start";
    };

    window.saveSession = async () => {
        if (seconds === 0) return alert("Nothing to save!");
        await addDoc(collection(db, "sessions"), { 
            name: document.getElementById('username').value || "Guest", 
            time: seconds, 
            timestamp: serverTimestamp() 
        });
        resetTimer();
    };

    window.sendMessage = async () => {
        const msg = document.getElementById('message');
        if(!msg.value) return;
        await addDoc(collection(db, "chat"), { 
            user: document.getElementById('username').value || "Guest", 
            text: msg.value, 
            timestamp: serverTimestamp() 
        });
        msg.value = "";
    };

    // 3. LISTENERS
    onSnapshot(query(collection(db, "sessions"), orderBy("timestamp", "desc")), (snap) => {
        document.getElementById('leaderboard').innerHTML = snap.docs.map(d => `<div><b>${d.data().name}</b>: ${Math.floor(d.data().time/60)}m</div>`).join('');
    });

    onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "asc")), (snap) => {
        document.getElementById('chat').innerHTML = snap.docs.map(d => `<div><b>${d.data().user}:</b> ${d.data().text}</div>`).join('');
    });
</script>
</body>
</html>
