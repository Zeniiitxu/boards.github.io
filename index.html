<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Hub Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  height: 100vh;
}

.panel {
  padding: 12px;
  overflow-y: auto;
  border-right: 1px solid #1e293b;
}

h2 { color: #60a5fa; font-size: 14px; }

.msg, .user {
  background: #1f2937;
  padding: 6px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 13px;
}

.messages {
  height: 75vh;
  overflow-y: auto;
  background: #111827;
  padding: 10px;
  border-radius: 8px;
}

.input {
  display: flex;
  margin-top: 8px;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  margin-left: 6px;
  padding: 8px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.small {
  font-size: 11px;
  color: #94a3b8;
}

.timer {
  font-size: 28px;
  text-align: center;
  margin: 10px 0;
}

.center { text-align:center; }
</style>
</head>

<body>

<div class="container">

<!-- USERS -->
<div class="panel">
  <h2>Online Users</h2>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="panel">
  <h2>Chat</h2>

  <div class="messages" id="messages"></div>
  <div id="typing" class="small"></div>

  <div class="input">
    <input id="msg" placeholder="Message..." />
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- TIMER + STATS -->
<div class="panel">

  <h2>Study Timer</h2>
  <div class="timer" id="timer">00:00:00</div>

  <div class="center">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="end()">End</button>
  </div>

  <h2>Leaderboard</h2>
  <div id="board"></div>

  <h2>Your Sessions</h2>
  <div id="sessions"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getDatabase, ref, set, push, onValue, onDisconnect
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC_uTFuqqywIyPMPjH4sNcXDbC__0vhTOE",
  authDomain: "styd-d1945.firebaseapp.com",
  projectId: "styd-d1945",
  storageBucket: "styd-d1945.firebasestorage.app",
  messagingSenderId: "60953296553",
  appId: "1:60953296553:web:ac86bfccdd16c915aff3b8",
  measurementId: "G-K8ZQJ0PEN5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;
let name = null;

/* AUTH */
signInAnonymously(auth);

onAuthStateChanged(auth, (user) => {
  if (!user) return;

  uid = user.uid;

  /* load or create profile */
  const profileRef = ref(db, "users/" + uid);

  onValue(profileRef, (snap) => {
    if (!snap.exists()) {
      name = "User-" + uid.slice(0,5);
      set(profileRef, { name, totalTime: 0 });
    } else {
      name = snap.val().name;
    }

    set(ref(db, "online/" + uid), { name });

    onDisconnect(ref(db, "online/" + uid)).remove();
  });
});

/* CHAT */
function sendMsg() {
  const text = document.getElementById("msg").value;
  if (!text) return;

  push(ref(db, "messages"), {
    text,
    uid,
    name,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}
window.sendMsg = sendMsg;

onValue(ref(db, "messages"), (snap) => {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  snap.forEach(c => {
    const m = c.val();
    const t = new Date(m.time).toLocaleTimeString();

    box.innerHTML += `
      <div class="msg">
        <b>${m.name}</b>: ${m.text}
        <div class="small">${t}</div>
      </div>
    `;
  });
});

/* ONLINE USERS */
onValue(ref(db, "online"), (snap) => {
  const box = document.getElementById("users");
  box.innerHTML = "";
  snap.forEach(c => {
    box.innerHTML += `<div class="user">${c.val().name}</div>`;
  });
});

/* TYPING */
let typingTimeout;

document.getElementById("msg").addEventListener("input", () => {
  set(ref(db, "typing/" + uid), name);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    set(ref(db, "typing/" + uid), null);
  }, 1000);
});

onValue(ref(db, "typing"), (snap) => {
  let t = "";
  snap.forEach(c => {
    if (c.val()) t += c.val() + " is typing... ";
  });
  document.getElementById("typing").innerText = t;
});

/* TIMER */
let startTime = 0;
let elapsed = 0;
let running = false;
let interval;

function fmt(ms) {
  let s = Math.floor(ms/1000);
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let sec = s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function update() {
  document.getElementById("timer").innerText = fmt(elapsed);
}

function start() {
  if (running) return;
  running = true;
  startTime = Date.now() - elapsed;

  interval = setInterval(() => {
    elapsed = Date.now() - startTime;
    update();
  }, 1000);
}

function pause() {
  running = false;
  clearInterval(interval);
}

function end() {
  pause();

  const session = {
    uid,
    name,
    time: elapsed,
    date: Date.now()
  };

  push(ref(db, "sessions"), session);

  /* update user total time */
  const userRef = ref(db, "users/" + uid);

  onValue(userRef, (snap) => {
    const data = snap.val();
    set(userRef, {
      ...data,
      totalTime: (data.totalTime || 0) + elapsed
    });
  }, { onlyOnce: true });

  elapsed = 0;
  update();
}

window.start = start;
window.pause = pause;
window.end = end;

/* GLOBAL SESSIONS */
onValue(ref(db, "sessions"), (snap) => {
  const box = document.getElementById("sessions");
  const board = document.getElementById("board");

  box.innerHTML = "";
  board.innerHTML = "";

  let totals = {};

  snap.forEach(c => {
    const s = c.val();
    const min = Math.floor(s.time/60000);

    box.innerHTML += `<div class="msg">${s.name} studied ${min} min</div>`;

    totals[s.uid] = (totals[s.uid] || 0) + s.time;
  });

  Object.entries(totals)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([id,time])=>{
      board.innerHTML += `<div class="user">${id.slice(0,5)}: ${Math.floor(time/60000)} min</div>`;
    });
});

</script>
</body>
</html>
