<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(247,162,106,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }

  /* ── SCREENS ── */
  .screen { display: none; animation: fadeUp 0.4s ease; }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SETUP SCREEN ── */
  .logo {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(32px, 8vw, 46px);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 18px;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .room-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .room-row input { margin-bottom: 0; flex: 1; }

  .btn-gen {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 18px;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-gen:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary:hover { background: #9180ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── MAIN SCREEN ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .room-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
  }

  .room-badge span { color: var(--accent); }

  .leave-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .leave-btn:hover { border-color: var(--red); color: var(--red); }

  /* MEMBERS */
  .section-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .members-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .member-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    transition: border-color 0.3s;
  }

  .member-card.studying { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.04); }
  .member-card.me { border-color: rgba(124,106,247,0.3); }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
    position: relative;
  }

  .avatar.purple { background: rgba(124,106,247,0.2); color: var(--accent); }
  .avatar.orange { background: rgba(247,162,106,0.2); color: var(--accent2); }
  .avatar.green  { background: rgba(74,222,128,0.2); color: var(--green); }
  .avatar.pink   { background: rgba(248,113,113,0.2); color: var(--red); }

  .status-dot {
    position: absolute;
    bottom: 0; right: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.online  { background: var(--green); }
  .status-dot.studying { background: var(--accent2); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,162,106,0.5); }
    50%       { box-shadow: 0 0 0 4px rgba(247,162,106,0); }
  }

  .member-info { flex: 1; }

  .member-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
  }

  .member-status {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-top: 2px;
  }

  .member-status.studying-text { color: var(--accent2); }
  .member-status.idle-text     { color: var(--muted); }

  .member-timer {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--green);
  }

  /* BIG BUTTON */
  .study-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: center;
  }

  .big-study-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  .big-study-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(124,106,247,0.2), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .big-study-btn:hover { transform: scale(1.06); border-color: var(--accent); }
  .big-study-btn:hover::before { opacity: 1; }

  .big-study-btn.active {
    border-color: var(--accent2);
    background: rgba(247,162,106,0.08);
    transform: scale(1.03);
    box-shadow: 0 0 40px rgba(247,162,106,0.2);
    animation: activePulse 2s infinite;
  }

  @keyframes activePulse {
    0%, 100% { box-shadow: 0 0 30px rgba(247,162,106,0.15); }
    50%       { box-shadow: 0 0 50px rgba(247,162,106,0.35); }
  }

  .btn-icon { font-size: 32px; margin-bottom: 4px; transition: transform 0.3s; }
  .big-study-btn:hover .btn-icon { transform: scale(1.15); }

  .btn-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .big-study-btn.active .btn-label { color: var(--accent2); }

  .my-timer {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 4px;
    min-height: 36px;
  }

  .my-timer.running { color: var(--green); }

  .study-status-text {
    font-size: 13px;
    color: var(--muted);
  }

  /* NOTIFICATIONS */
  .notif-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .notif-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .notif-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .notif-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 2px 7px;
    border-radius: 10px;
    display: none;
  }
  .notif-badge.visible { display: block; }

  .notif-list {
    max-height: 180px;
    overflow-y: auto;
  }

  .notif-item {
    display: flex;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .notif-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .notif-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .notif-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .notif-empty {
    padding: 20px;
    text-align: center;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-align: center;
    margin-top: 12px;
    line-height: 1.5;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 0;
    text-decoration: underline dotted;
  }
  .copy-btn:hover { color: #9180ff; }
</style>
</head>
<body>

<div id="app">

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <div class="logo">StudySync</div>
    <h1>Study together,<br>stay in sync.</h1>
    <p class="tagline">Join a room with your friend. Get notified when they're ready to grind.</p>

    <label>Your name</label>
    <input type="text" id="input-name" placeholder="e.g. Arpan" maxlength="20" autocomplete="off">

    <label>Room code</label>
    <div class="room-row">
      <input type="text" id="input-room" placeholder="e.g. CHEM-0427" maxlength="20" autocomplete="off" style="text-transform:uppercase">
      <button class="btn-gen" onclick="genRoom()" title="Generate code">🎲</button>
    </div>

    <button class="btn-primary" id="join-btn" onclick="joinRoom()">Join Room →</button>
    <p class="hint">Share the same room code with your friend to connect.</p>
  </div>

  <!-- MAIN SCREEN -->
  <div class="screen" id="screen-main">
    <div class="top-bar">
      <div class="room-badge">Room: <span id="room-display">—</span></div>
      <button class="leave-btn" onclick="leaveRoom()">Leave</button>
    </div>

    <div class="section-label">Members</div>
    <div class="members-list" id="members-list"></div>

    <div class="study-block">
      <button class="big-study-btn" id="study-btn" onclick="toggleStudy()">
        <div class="btn-icon" id="btn-icon">📖</div>
        <div class="btn-label" id="btn-label">Start</div>
      </button>
      <div class="my-timer" id="my-timer">—</div>
      <div class="study-status-text" id="study-status-text">Tap to start your session</div>
    </div>

    <div class="notif-area">
      <div class="notif-header">
        <div class="notif-title">Activity Feed</div>
        <div class="notif-badge" id="notif-badge">0</div>
      </div>
      <div class="notif-list" id="notif-list">
        <div class="notif-empty" id="notif-empty">No activity yet...</div>
      </div>
    </div>

    <p class="hint" id="copy-hint">
      Invite your friend: <button class="copy-btn" onclick="copyRoom()">copy room code</button>
    </p>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const API_KEY_PLACEHOLDER = ""; // Handled by Anthropic proxy
const POLL_INTERVAL = 3000; // ms

// ── STATE ──
let myName = "";
let roomCode = "";
let isStudying = false;
let studyStart = null;
let timerInterval = null;
let pollInterval = null;
let lastSeenVersion = 0;
let newNotifCount = 0;

// Storage keys
const roomKey  = () => `room:${roomCode}`;

// ── STORAGE HELPERS (using Claude's persistent storage API) ──
async function storageGet(key) {
  try {
    const r = await window.storage.get(key, true); // shared=true
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}

async function storageSet(key, val) {
  try {
    await window.storage.set(key, JSON.stringify(val), true); // shared=true
    return true;
  } catch { return false; }
}

// ── ROOM DATA STRUCTURE ──
// { version: n, members: { name: { name, studying, studyStart, lastSeen } }, events: [{id, type, name, ts}] }

async function getRoomData() {
  return await storageGet(roomKey()) || {
    version: 0, members: {}, events: []
  };
}

async function setRoomData(data) {
  data.version = (data.version || 0) + 1;
  await storageSet(roomKey(), data);
  return data;
}

// ── UI HELPERS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg, icon = "✨") {
  const t = document.getElementById('toast');
  t.innerHTML = `${icon} ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 5)  return 'just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

function genRoom() {
  const subjects = ['PHYS','CHEM','MATH','COMP','ENG','BIO','HIST'];
  const sub = subjects[Math.floor(Math.random() * subjects.length)];
  const num = Math.floor(1000 + Math.random() * 9000);
  document.getElementById('input-room').value = `${sub}-${num}`;
}

function copyRoom() {
  navigator.clipboard.writeText(roomCode).then(() => showToast(`Copied "${roomCode}"`, "📋"));
}

// ── JOIN / LEAVE ──
async function joinRoom() {
  const nameEl = document.getElementById('input-name');
  const roomEl = document.getElementById('input-room');
  myName = nameEl.value.trim();
  roomCode = roomEl.value.trim().toUpperCase();

  if (!myName) { showToast("Enter your name first!", "⚠️"); return; }
  if (!roomCode) { showToast("Enter a room code!", "⚠️"); return; }

  const btn = document.getElementById('join-btn');
  btn.disabled = true;
  btn.textContent = "Joining...";

  let data = await getRoomData();
  data.members[myName] = { name: myName, studying: false, studyStart: null, lastSeen: Date.now() };
  data.events = data.events || [];
  data.events.push({ id: Date.now(), type: 'join', name: myName, ts: Date.now() });
  if (data.events.length > 50) data.events = data.events.slice(-50);
  await setRoomData(data);
  lastSeenVersion = data.version;

  document.getElementById('room-display').textContent = roomCode;
  showScreen('screen-main');
  renderRoom(data);
  startPolling();
  showToast(`Joined room ${roomCode}`, "🚀");

  btn.disabled = false;
  btn.textContent = "Join Room →";
}

async function leaveRoom() {
  if (!confirm("Leave the room?")) return;
  stopPolling();
  if (timerInterval) clearInterval(timerInterval);

  let data = await getRoomData();
  if (data.members[myName]) {
    delete data.members[myName];
    data.events = data.events || [];
    data.events.push({ id: Date.now(), type: 'leave', name: myName, ts: Date.now() });
    await setRoomData(data);
  }

  isStudying = false;
  studyStart = null;
  lastSeenVersion = 0;
  newNotifCount = 0;
  document.getElementById('notif-list').innerHTML = '<div class="notif-empty">No activity yet...</div>';
  showScreen('screen-setup');
}

// ── STUDY TOGGLE ──
async function toggleStudy() {
  isStudying = !isStudying;
  studyStart = isStudying ? Date.now() : null;

  const btn = document.getElementById('study-btn');
  const icon = document.getElementById('btn-icon');
  const lbl  = document.getElementById('btn-label');
  const st   = document.getElementById('study-status-text');
  const timer = document.getElementById('my-timer');

  if (isStudying) {
    btn.classList.add('active');
    icon.textContent = '⏸';
    lbl.textContent = 'Stop';
    st.textContent = 'Session in progress...';
    timer.classList.add('running');
    // Start local timer
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (studyStart) {
        const secs = Math.floor((Date.now() - studyStart) / 1000);
        timer.textContent = fmtTime(secs);
      }
    }, 1000);
    timer.textContent = '00:00';
  } else {
    btn.classList.remove('active');
    icon.textContent = '📖';
    lbl.textContent = 'Start';
    st.textContent = 'Tap to start your session';
    timer.classList.remove('running');
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    const elapsed = studyStart ? fmtTime(Math.floor((Date.now() - studyStart) / 1000)) : '0:00';
    timer.textContent = elapsed;
  }

  // Push to shared storage
  let data = await getRoomData();
  if (data.members[myName]) {
    data.members[myName].studying = isStudying;
    data.members[myName].studyStart = studyStart;
    data.members[myName].lastSeen = Date.now();
  }
  data.events = data.events || [];
  data.events.push({
    id: Date.now(),
    type: isStudying ? 'start' : 'stop',
    name: myName,
    ts: Date.now()
  });
  if (data.events.length > 50) data.events = data.events.slice(-50);
  await setRoomData(data);
}

// ── RENDER ──
function renderRoom(data) {
  const list = document.getElementById('members-list');
  const colors = ['purple','orange','green','pink'];
  const members = Object.values(data.members || {});

  list.innerHTML = '';

  if (members.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--muted);font-family:Space Mono,monospace;padding:12px 0;">Waiting for members...</div>';
    return;
  }

  members.forEach((m, i) => {
    const isMe = m.name === myName;
    const isOnline = Date.now() - (m.lastSeen || 0) < 12000;
    const colorClass = colors[i % colors.length];
    const elapsed = m.studying && m.studyStart ? Math.floor((Date.now() - m.studyStart) / 1000) : 0;

    const card = document.createElement('div');
    card.className = `member-card${m.studying ? ' studying' : ''}${isMe ? ' me' : ''}`;
    card.innerHTML = `
      <div class="avatar ${colorClass}">
        ${m.name.charAt(0).toUpperCase()}
        <div class="status-dot ${m.studying ? 'studying' : (isOnline ? 'online' : '')}"></div>
      </div>
      <div class="member-info">
        <div class="member-name">${m.name}${isMe ? ' <span style="font-size:10px;color:var(--muted)">(you)</span>' : ''}</div>
        <div class="member-status ${m.studying ? 'studying-text' : 'idle-text'}">
          ${m.studying ? '📖 studying' : (isOnline ? '● online' : '○ away')}
        </div>
      </div>
      ${m.studying && elapsed > 0 ? `<div class="member-timer">${fmtTime(elapsed)}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

function renderEvents(data, isNew = false) {
  const events = (data.events || []).slice().reverse(); // newest first
  const listEl = document.getElementById('notif-list');
  const emptyEl = document.getElementById('notif-empty');

  if (events.length === 0) {
    listEl.innerHTML = '<div class="notif-empty">No activity yet...</div>';
    return;
  }

  // Clear empty msg
  const existing = listEl.querySelectorAll('.notif-item');
  const existingIds = new Set([...existing].map(e => e.dataset.id));

  // Prepend new events
  events.forEach(ev => {
    if (existingIds.has(String(ev.id))) return;

    const isOwnEvent = ev.name === myName;
    const icons = { join: '👋', leave: '🚪', start: '📖', stop: '✅' };
    const msgs = {
      join:  `${ev.name} joined the room`,
      leave: `${ev.name} left the room`,
      start: `${ev.name} started studying!`,
      stop:  `${ev.name} ended their session`
    };

    const item = document.createElement('div');
    item.className = 'notif-item';
    item.dataset.id = ev.id;
    item.innerHTML = `
      <div class="notif-icon">${icons[ev.type] || '•'}</div>
      <div>
        <div class="notif-text">${msgs[ev.type] || ev.type}</div>
        <div class="notif-time">${timeAgo(ev.ts)}</div>
      </div>
    `;

    const firstItem = listEl.querySelector('.notif-item');
    if (firstItem) listEl.insertBefore(item, firstItem);
    else listEl.appendChild(item);

    // Remove empty placeholder
    const ep = listEl.querySelector('.notif-empty');
    if (ep) ep.remove();

    // Toast for friends starting (not yourself)
    if (isNew && ev.type === 'start' && !isOwnEvent) {
      showToast(`${ev.name} just started studying! 📖`, "🔔");
      newNotifCount++;
      updateNotifBadge();
      // Browser notification if permitted
      sendBrowserNotif(ev.name);
    }
    if (isNew && ev.type === 'join' && !isOwnEvent) {
      showToast(`${ev.name} joined the room!`, "👋");
    }
  });
}

function updateNotifBadge() {
  const badge = document.getElementById('notif-badge');
  if (newNotifCount > 0) {
    badge.textContent = newNotifCount;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

// Browser Notifications
function sendBrowserNotif(friendName) {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") {
    new Notification("StudySync 📖", { body: `${friendName} just started studying! Join them!`, icon: "" });
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(p => {
      if (p === "granted") {
        new Notification("StudySync 📖", { body: `${friendName} just started studying!` });
      }
    });
  }
}

// ── POLLING ──
function startPolling() {
  // Request notification permission early
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }

  pollInterval = setInterval(async () => {
    const data = await getRoomData();
    if (!data) return;

    // Update my lastSeen
    if (data.members[myName]) {
      data.members[myName].lastSeen = Date.now();
      // Don't bump version just for heartbeat — write quietly
      await storageSet(roomKey(), JSON.stringify(data));
    }

    if (data.version !== lastSeenVersion) {
      const isNew = lastSeenVersion > 0;
      lastSeenVersion = data.version;

      // Sync my study state from storage (in case another tab changed it)
      renderRoom(data);
      renderEvents(data, isNew);
    }
  }, POLL_INTERVAL);
}

function stopPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = null;
}

// ── INIT ──
document.getElementById('input-room').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('input-room').focus();
});

document.getElementById('input-room').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
</script>
